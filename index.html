<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RADIANT PRODUCTION</title>

<style>
	@font-face {
		font-family: "TRYJackAlpha";
		src: url("./jack-font-family/TRYJackAlpha-Regular.ttf") format("truetype");
		font-weight: 400;
		font-style: normal;
		font-display: swap;
	}

	:root {
		color-scheme: dark;
		--page-padding: clamp(1rem, 4vw, 3rem);
		--content-width: min(100%, 72rem);
	}

	html, body {
		margin: 0;
		padding: 0;
		width: 100%;
		min-height: 100%;
		overflow-x: hidden;
		font-family: jack, sans-serif;
	}

	* {
		box-sizing: border-box;
	}

	img,
	svg,
	canvas,
	video {
		display: block;
		max-width: 100%;
	}

	.bg-layer {
		position: fixed;
		inset: 0;
		width: 100%;
		height: 100vh;
		height: 100svh;
		z-index: -1;
		overflow: hidden;
		pointer-events: none;
	}

	.bg-layer > * {
		width: 100% !important;
		height: 100% !important;
	}

	.content {
		position: relative;
		z-index: 10;
		width: var(--content-width);
		min-height: 300vh;
		margin: 0 auto;
		color: white;
		padding: var(--page-padding);
	}

	h1,
	h2,
	h3,
	h4,
	h5,
	h6 {
		font-family: "TRYJackAlpha", sans-serif;
		font-weight: 400;
	}

	.content h1 {
		margin: 0;
		font-size: clamp(2.5rem, 10vw, 8rem);
		line-height: 0.9;
		text-align: center;
		text-wrap: balance;
	}

	.content p {
		margin: 1rem 0 0;
		font-size: clamp(1rem, 2vw, 1.25rem);
		line-height: 1.5;
	}

	@media (max-width: 640px) {
		.content {
			min-height: 220vh;
			padding-block: 1.25rem;
		}
	}
</style>
</head>

<body>


	<div class="bg-layer" data-us-project="tlLwDUpH4IfyklZcDHKK"></div>

	<div class="content">
		<h1>Overlay Content</h1>
		<p>Scroll me.</p>
	</div>

<script type="text/javascript">
!function(){
	var u=window.UnicornStudio;
	if(u&&u.init){
		if(document.readyState==="loading"){
			document.addEventListener("DOMContentLoaded",function(){u.init()})
		}else{
			u.init()
		}
	}else{
		window.UnicornStudio={isInitialized:!1};
		var i=document.createElement("script");
		i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.12/dist/unicornStudio.umd.js",
		i.onload=function(){
			if(document.readyState==="loading"){
				document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})
			}else{
				UnicornStudio.init()
			}
		},
		(document.head||document.body).appendChild(i)
	}
}();
</script>

</body>
</html>
